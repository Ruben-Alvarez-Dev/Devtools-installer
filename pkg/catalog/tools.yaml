# DevTools Installer Catalog
# This file contains the tool definitions for the installer

version: "1.0"
tools:
  # ===========================================
  # RUNTIMES
  # ===========================================
  - id: nodejs
    name: Node.js
    description: JavaScript runtime built on Chrome's V8 engine
    category: runtime
    icon: nodejs
    website: https://nodejs.org
    documentation: https://nodejs.org/docs
    tags:
      - javascript
      - runtime
      - server
    installMethods:
      - type: homebrew
        package: node
        platform: darwin
      - type: homebrew
        package: node
        platform: linux
      - type: winget
        package: OpenJS.NodeJS.LTS
        platform: windows
      - type: direct
        url: https://nodejs.org/dist/v22.11.0/node-v22.11.0-darwin-arm64.tar.gz
        platform: darwin
        arch: arm64

  - id: python
    name: Python
    description: High-level programming language
    category: runtime
    icon: python
    website: https://python.org
    documentation: https://docs.python.org
    tags:
      - python
      - runtime
      - scripting
    installMethods:
      - type: homebrew
        package: python@3.12
        platform: darwin
      - type: apt
        package: python3
        platform: linux
      - type: winget
        package: Python.Python.3.12
        platform: windows

  - id: go
    name: Go
    description: Open source programming language by Google
    category: runtime
    icon: go
    website: https://golang.org
    documentation: https://golang.org/doc
    tags:
      - golang
      - runtime
      - compiled
    installMethods:
      - type: homebrew
        package: go
        platform: darwin
      - type: apt
        package: golang-go
        platform: linux
      - type: winget
        package: GoLang.Go
        platform: windows

  - id: rust
    name: Rust
    description: Systems programming language focused on safety and performance
    category: runtime
    icon: rust
    website: https://rust-lang.org
    documentation: https://doc.rust-lang.org
    tags:
      - rust
      - runtime
      - compiled
      - systems
    installMethods:
      - type: homebrew
        package: rust
        platform: darwin
      - type: script
        script: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        platform: linux
      - type: winget
        package: Rustlang.Rustup
        platform: windows

  - id: deno
    name: Deno
    description: Secure TypeScript runtime
    category: runtime
    icon: deno
    website: https://deno.land
    documentation: https://deno.land/manual
    tags:
      - typescript
      - runtime
      - javascript
    installMethods:
      - type: homebrew
        package: deno
        platform: darwin
      - type: homebrew
        package: deno
        platform: linux
      - type: winget
        package: DenoLand.Deno
        platform: windows

  # ===========================================
  # IDEs
  # ===========================================
  - id: vscode
    name: Visual Studio Code
    description: Lightweight code editor with extensive ecosystem
    category: ide
    icon: vscode
    website: https://code.visualstudio.com
    documentation: https://code.visualstudio.com/docs
    tags:
      - editor
      - ide
      - microsoft
    installMethods:
      - type: homebrew
        package: --cask visual-studio-code
        platform: darwin
      - type: apt
        package: code
        platform: linux
      - type: winget
        package: Microsoft.VisualStudioCode
        platform: windows

  - id: cursor
    name: Cursor
    description: AI-first code editor built for pair programming with AI
    category: ai_ide
    icon: cursor
    website: https://cursor.sh
    documentation: https://cursor.sh/docs
    whySpecial: Standard AI-IDE with predictive tab, multi-file composer
    idealUse: Daily development with AI
    configPath: ~/.cursor/
    tags:
      - editor
      - ide
      - ai
      - vscode-fork
    installMethods:
      - type: homebrew-cask
        package: cursor
        platform: darwin
      - type: winget
        package: Cursor.Cursor
        platform: windows

  # ===========================================
  # AI IDEs
  # ===========================================
  - id: windsurf
    name: Windsurf
    description: AI IDE with unlimited free autocompletion
